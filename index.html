<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tuki</title>
<meta name="description" content="Tuki — личная страничка" />
<link rel="icon" type="image/jpeg" href="assets/avatar.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #07070d;
    --accent: #7c5cff;
    --accent-2: #ff5cc8;
    --accent-3: #33e0ff;
    --text: #f4f2ff;
    --muted: #a9a6c9;
    --card: rgba(255, 255, 255, 0.05);
    --card-border: rgba(255, 255, 255, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ---------- фон: анимированные градиентные пятна ---------- */
  .bg-blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.55;
    mix-blend-mode: screen;
    animation: drift 22s ease-in-out infinite;
  }
  .blob.b1 { width: 46vmax; height: 46vmax; background: var(--accent);   top: -12vmax; left: -10vmax; animation-delay: 0s; }
  .blob.b2 { width: 40vmax; height: 40vmax; background: var(--accent-2); bottom: -14vmax; right: -8vmax; animation-delay: -7s; }
  .blob.b3 { width: 34vmax; height: 34vmax; background: var(--accent-3); bottom: 10vmax; left: 20vmax; animation-delay: -14s; }

  @keyframes drift {
    0%,100% { transform: translate(0,0) scale(1); }
    33%     { transform: translate(6vmax,4vmax) scale(1.12); }
    66%     { transform: translate(-5vmax,-3vmax) scale(0.94); }
  }

  /* canvas с частицами поверх пятен */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* лёгкая сетка-текстура */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(circle at 50% 40%, black, transparent 75%);
    -webkit-mask-image: radial-gradient(circle at 50% 40%, black, transparent 75%);
  }

  /* ---------- контент ---------- */
  .wrap {
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 22px;
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .avatar-ring {
    position: relative;
    width: 168px;
    height: 168px;
    display: grid;
    place-items: center;
    margin-bottom: 26px;
  }
  .avatar-ring::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
    animation: spin 6s linear infinite;
    filter: blur(2px);
  }
  .avatar-ring::after {
    content: "";
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,255,0.5), transparent 70%);
    animation: pulse 3.6s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50%     { opacity: 0.9; transform: scale(1.08); }
  }
  .avatar {
    position: relative;
    z-index: 1;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--bg);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .avatar-ring { cursor: pointer; }
  .avatar-ring:hover .avatar { transform: scale(1.05); }
  .avatar-ring:active .avatar { transform: scale(0.97); }

  /* подсказка «тыкни на меня» */
  .avatar-hint {
    color: var(--muted);
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 26px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    animation: hintbob 2.4s ease-in-out infinite;
    transition: opacity 0.3s;
  }
  .avatar-hint.hidden { opacity: 0; pointer-events: none; }
  @keyframes hintbob {
    0%,100% { opacity: 0.55; }
    50%     { opacity: 1; }
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.6rem, 9vw, 4.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(120deg, #fff 20%, var(--accent-3) 50%, var(--accent-2) 80%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
  }
  .tagline {
    color: var(--muted);
    font-size: 1.02rem;
    max-width: 440px;
    margin-bottom: 30px;
  }

  /* ---------- соцсети ---------- */
  .socials {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin-bottom: 8px;
  }
  .social {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    border-radius: 16px;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    text-decoration: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), background 0.25s, border-color 0.25s, box-shadow 0.25s;
  }
  .social svg { width: 24px; height: 24px; }
  .social:hover {
    transform: translateY(-6px) scale(1.06);
    background: rgba(255,255,255,0.12);
    border-color: var(--accent);
    box-shadow: 0 12px 30px rgba(124,92,255,0.35);
  }

  /* ---------- секция пёселя (сворачиваемая) ---------- */
  .dog-reveal {
    width: 100%;
    display: grid;
    grid-template-rows: 0fr;
    opacity: 0;
    transition: grid-template-rows 0.55s cubic-bezier(.4,0,.2,1), opacity 0.4s ease;
  }
  .dog-reveal.open {
    grid-template-rows: 1fr;
    opacity: 1;
    margin-top: 40px;
  }
  .dog-reveal > .dog-inner {
    overflow: hidden;
    min-height: 0;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .section-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 100%;
  }
  .gallery figure {
    position: relative;
    overflow: hidden;
    border-radius: 18px;
    border: 1px solid var(--card-border);
    aspect-ratio: 1 / 1;
    cursor: pointer;
    background: var(--card);
  }
  .gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }
  .gallery figure:hover img { transform: scale(1.08); }
  .gallery figure::after {
    content: "🐾";
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 1.1rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .gallery figure:hover::after { opacity: 1; transform: translateY(0); }

  /* ---------- лайтбокс ---------- */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(3,3,8,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 88vh;
    border-radius: 16px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    animation: pop 0.3s ease;
  }
  @keyframes pop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  footer {
    margin-top: 56px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer .heart { color: var(--accent-2); }

  @media (max-width: 480px) {
    .avatar-ring { width: 150px; height: 150px; }
    .avatar { width: 132px; height: 132px; }
    .social { width: 50px; height: 50px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .blob, .avatar-ring::before, .avatar-ring::after { animation: none; }
    #particles { display: none; }
  }
</style>
</head>
<body>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Просмотр фото">
    <img src="" alt="Фото в полном размере" id="lightbox-img" />

  <script>
    // ---------- частицы на canvas ----------
    (function () {
      const canvas = document.getElementById('particles');
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) return;
      const ctx = canvas.getContext('2d');
      let w, h, particles, raf;

      function resize() {
        w = canvas.width = window.innerWidth * devicePixelRatio;
        h = canvas.height = window.innerHeight * devicePixelRatio;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
      }

      function makeParticles() {
        const count = Math.min(90, Math.floor(window.innerWidth / 14));
        particles = Array.from({ length: count }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          r: (Math.random() * 1.8 + 0.4) * devicePixelRatio,
          vx: (Math.random() - 0.5) * 0.25 * devicePixelRatio,
          vy: (Math.random() - 0.5) * 0.25 * devicePixelRatio,
          a: Math.random() * 0.5 + 0.2
        }));
      }

      const linkDist = 130 * devicePixelRatio;

      function tick() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(200, 190, 255, ' + p.a + ')';
          ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j];
            const dx = p.x - q.x, dy = p.y - q.y;
            const d = Math.hypot(dx, dy);
            if (d < linkDist) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = 'rgba(124, 92, 255, ' + (0.14 * (1 - d / linkDist)) + ')';
              ctx.lineWidth = devicePixelRatio;
              ctx.stroke();
            }
          }
        }
        raf = requestAnimationFrame(tick);
      }

      resize();
      makeParticles();
      tick();
      window.addEventListener('resize', () => {
        cancelAnimationFrame(raf);
        resize();
        makeParticles();
        tick();
      });
    })();

    // ---------- раскрытие пёселя по клику на аватарку ----------
    (function () {
      const btn = document.getElementById('avatarBtn');
      const reveal = document.getElementById('dogReveal');
      const hint = document.getElementById('avatarHint');
      const gallery = document.getElementById('gallery');

      // тасуем порядок фоток — при каждом раскрытии пёсель встречает по-новому
      function shuffle() {
        const figs = Array.from(gallery.children);
        for (let i = figs.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [figs[i], figs[j]] = [figs[j], figs[i]];
        }
        figs.forEach((f) => gallery.appendChild(f));
      }

      function toggle() {
        const open = reveal.classList.toggle('open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        hint.classList.toggle('hidden', open);
        if (open) {
          shuffle();
          reveal.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      btn.addEventListener('click', toggle);
      btn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });
    })();

    // ---------- лайтбокс ----------
    (function () {
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      document.getElementById('gallery').addEventListener('click', (e) => {
        const img = e.target.closest('img');
        if (!img) return;
        lbImg.src = img.src;
        lbImg.alt = img.alt;
        lb.classList.add('open');
      });
      function close() { lb.classList.remove('open'); lbImg.src = ''; }
      lb.addEventListener('click', close);
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
    })();
  </script>
